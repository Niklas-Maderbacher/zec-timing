apiVersion: apps/v1
kind: Deployment
metadata:
  name: user-deployment
  labels:
    app: user-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: user-service
  template:
    metadata:
      labels:
        app: user-service
    spec:
      containers:
        - name: user-service
          image: ghcr.io/niklas-maderbacher/zec-timing:user-service
          ports:
            - containerPort: 8000
          env:
            - name: PROJECT_NAME
              value: user-service
            - name: POSTGRES_SERVER
              value: "172.31.177.213"
            - name: POSTGRES_PORT
              value: "5433"
            - name: POSTGRES_USER
              value: postgres
            - name: POSTGRES_PASSWORD
              value: postgres
            - name: POSTGRES_DB
              value: userdb
            - name: KEYCLOAK_USER_URL
              value: http://keycloak:8080/admin/realms/zec-realm/users
            - name: AUTH_SERVICE_URL
              value: http://auth-service:8002
            - name: TEAM_SERVICE_URL
              value: http://team-service:8006
            - name: KC_CLIENTS_URL
              value: http://keycloak:8080/admin/realms/zec-realm/clients
            - name: KC_CLIENT_ID
              value: login-client
          resources:
            # todo
            requests:
              cpu: 250m
              memory: 250Mi
            limits:
              cpu: 1
              memory: 1000Mi

