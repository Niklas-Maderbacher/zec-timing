services:
  zec-mqtt-broker:
    container_name: zec-mqtt-broker
    image: ghcr.io/niklas-maderbacher/zec-timing:mqtt-broker
    env_file:
      - .env
    ports:
      - ${MQTT_PORT}:${MQTT_PORT}
      - 8100:8080
    healthcheck:
      test: [ "CMD-SHELL", "pgrep mosquitto" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

  zec-redis-db:
    container_name: zec-redis-db
    image: redis:alpine
    env_file:
      - .env
    # --save = redis will not save data to disk
    # --appendonly no = disables Append-Only files, no saves are persistant
    command: [ "redis-server", "--save", "", "--appendonly", "no" ]
    tmpfs:
      - /data
    ports:
      - ${REDIS_PORT}:${REDIS_PORT}
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 30s
      timeout: 3s
      retries: 5

  #  zec-mqtt-worker-testing:
  #    container_name: zec-mqtt-worker-testing
  #    image: python:3.12
  #    build:
  #      context: ./mqtt-worker
  #    depends_on:
  #      zec-redis-db:
  #        condition: service_healthy
  #        restart: true
  #      zec-mqtt-broker:
  #        condition: service_healthy
  #        restart: true
  #    command: bash app/tests/test.sh
  #    env_file:
  #      - .env
  #    environment:
  #      - MQTT_IP=${MQTT_IP}
  #      - MQTT_PORT=${MQTT_PORT}
  #      - MQTT_TOPIC=${MQTT_TOPIC}
  #      - REDIS_HOST=${REDIS_HOST}
  #      - REDIS_PORT=${REDIS_PORT}

  zec-mqtt-worker:
    container_name: zec-mqtt-worker
    image: ghcr.io/niklas-maderbacher/zec-timing:mqtt-worker
    restart: always
    depends_on:
      zec-redis-db:
        condition: service_healthy
        restart: true
      zec-mqtt-broker:
        condition: service_healthy
        restart: true

    env_file:
      - .env
    ports:
      - ${MQTT_WORKER_PORT}:8000
    environment:
      - MQTT_IP=${MQTT_IP}
      - MQTT_PORT=${MQTT_PORT}
      - MQTT_TOPIC=${MQTT_TOPIC}
      - REDIS_HOST=${REDIS_HOST}
      - REDIS_PORT=${REDIS_PORT}

  nginx:
    image: ghcr.io/niklas-maderbacher/zec-timing:api-gateway
    container_name: nginx
    ports:
      - "80:80"
    environment:
      - NGINX_API=${NGINX_API}
      - API_KEY_1=${API_KEY_1}
      - API_KEY_2=${API_KEY_2}

  user-db:
    image: postgres:16
    container_name: user-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: userdb
    volumes:
      - user_db_data:/var/lib/postgresql/data
    ports:
      - "5433:5432"

  auth-db:
    image: postgres:16
    container_name: auth-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: authdb
    volumes:
      - auth_db_data:/var/lib/postgresql/data
    ports:
      - "5434:5432"

  challenge-db:
    image: postgres:16
    container_name: challenge-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: challengedb
    volumes:
      - challenge_db_data:/var/lib/postgresql/data
    ports:
      - "5435:5432"

  attempt-db:
    image: postgres:16
    container_name: attempt-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: attemptdb
    volumes:
      - attempt_db_data:/var/lib/postgresql/data
    ports:
      - "5436:5432"

  score-db:
    image: postgres:16
    container_name: score-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: scoredb
    volumes:
      - score_db_data:/var/lib/postgresql/data
    ports:
      - "5437:5432"

  team-db:
    image: postgres:16
    container_name: team-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: teamdb
    volumes:
      - team_db_data:/var/lib/postgresql/data
    ports:
      - "5438:5432"

  keycloak-db:
    image: postgres:17
    container_name: keycloak-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: keycloak
    volumes:
      - keycloak_db_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres" ]
      interval: 5s
      timeout: 5s
      retries: 5

  adminer:
    image: adminer
    container_name: adminer
    restart: always
    ports:
      - "8080:8080"
    depends_on:
      - user-db
      - auth-db
      - challenge-db
      - attempt-db
      - score-db
      - team-db
      - keycloak-db

volumes:
  user_db_data:
  auth_db_data:
  challenge_db_data:
  attempt_db_data:
  score_db_data:
  team_db_data:
  keycloak_db_data:
