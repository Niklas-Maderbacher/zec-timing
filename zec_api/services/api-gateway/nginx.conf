events {}

http {
    upstream user_service {
        server user-service:8001;
    }

    upstream auth_service {
        server auth-service:8002;
    }

    upstream challenge_service {
        server challenge-service:8003;
    }

    upstream attempt_service {
        server attempt-service:8004;
    }

    upstream score_service {
        server score-service:8005;
    }

    upstream team_service {
        server team-service:8006;
    }

    map $http_x_api_key $skip_auth {
        default 0;
        "api-key-1-very-secret" 1;
        "api-key-2-very-secret" 1;
    }

    map $http_origin $cors_origin {
        default $http_origin;
    }

    server {
        listen 80;
        client_max_body_size 100M;
        proxy_set_header Host $host;
        proxy_set_header X-API-Key $http_x_api_key;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Authorization $http_authorization;

        location = /auth_admin {
            internal;
            if ($skip_auth = 1) { return 204; }
            proxy_pass http://auth_service/api/auth/internal/verify/admin;
            proxy_pass_request_body off;
            proxy_set_header Content-Length "";
            proxy_set_header X-Original-URI $request_uri;
        }

        location = /auth_teamlead {
            internal;
            if ($skip_auth = 1) { return 204; }
            proxy_pass http://auth_service/api/auth/internal/verify/teamlead;
            proxy_pass_request_body off;
            proxy_set_header Content-Length "";
            proxy_set_header X-Original-URI $request_uri;
        }

        location = /auth_viewer {
            internal;
            if ($skip_auth = 1) { return 204; }
            proxy_pass http://auth_service/api/auth/internal/verify/viewer;
            proxy_pass_request_body off;
            proxy_set_header Content-Length "";
            proxy_set_header X-Original-URI $request_uri;
        }

        location /internal/ {
            internal;
            proxy_pass http://auth_service/api/auth/internal;
        }

        location /login {
            add_header Access-Control-Allow-Origin $cors_origin always;
            add_header Access-Control-Allow-Credentials true always;
            add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS, PATCH" always;
            add_header Access-Control-Allow-Headers "Authorization, Content-Type, Accept, Origin, X-Requested-With, X-API-Key" always;
            if ($request_method = OPTIONS) {
                add_header Access-Control-Max-Age 1728000;
                add_header Content-Length 0;
                add_header Content-Type text/plain;
                return 204;
            }
            proxy_pass http://auth_service/api/auth/login;
        }

        location /refresh {
            add_header Access-Control-Allow-Origin $cors_origin always;
            add_header Access-Control-Allow-Credentials true always;
            add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS, PATCH" always;
            add_header Access-Control-Allow-Headers "Authorization, Content-Type, Accept, Origin, X-Requested-With, X-API-Key" always;
            if ($request_method = OPTIONS) {
                add_header Access-Control-Max-Age 1728000;
                add_header Content-Length 0;
                add_header Content-Type text/plain;
                return 204;
            }
            proxy_pass http://auth_service/api/auth/refresh;
        }

        location ~ ^/users(/.*)?$ {
            add_header Access-Control-Allow-Origin $cors_origin always;
            add_header Access-Control-Allow-Credentials true always;
            add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS, PATCH" always;
            add_header Access-Control-Allow-Headers "Authorization, Content-Type, Accept, Origin, X-Requested-With, X-API-Key" always;
            if ($request_method = OPTIONS) {
                return 204;
            }
            auth_request /auth_admin;
            proxy_pass http://user_service/api/users$1$is_args$args;
        }

        location = /users/me {
            add_header Access-Control-Allow-Origin $cors_origin always;
            add_header Access-Control-Allow-Credentials true always;
            add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS, PATCH" always;
            add_header Access-Control-Allow-Headers "Authorization, Content-Type, Accept, Origin, X-Requested-With, X-API-Key" always;
            if ($request_method = OPTIONS) {
                return 204;
            }
            auth_request /auth_teamlead;
            proxy_pass http://user_service/api/users/me;
        }

        location ~ ^/teams(/.*)?$ {
            add_header Access-Control-Allow-Origin $cors_origin always;
            add_header Access-Control-Allow-Credentials true always;
            add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS, PATCH" always;
            add_header Access-Control-Allow-Headers "Authorization, Content-Type, Accept, Origin, X-Requested-With, X-API-Key" always;
            auth_request_set $user_id  $upstream_http_x_user_id;
            auth_request_set $team_id  $upstream_http_x_team_id;
            auth_request_set $role     $upstream_http_x_role;

            proxy_set_header X-User-Id $user_id;
            proxy_set_header X-Team-Id $team_id;
            proxy_set_header X-Role    $role;
            if ($request_method = OPTIONS) {
                return 204;
            }
            auth_request /auth_teamlead;
            proxy_pass http://team_service/api/teams$1$is_args$args;
        }

        location ~ ^/drivers(/.*)?$ {
            add_header Access-Control-Allow-Origin $cors_origin always;
            add_header Access-Control-Allow-Credentials true always;
            add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS, PATCH" always;
            add_header Access-Control-Allow-Headers "Authorization, Content-Type, Accept, Origin, X-Requested-With, X-API-Key" always;
            auth_request_set $user_id  $upstream_http_x_user_id;
            auth_request_set $team_id  $upstream_http_x_team_id;
            auth_request_set $role     $upstream_http_x_role;
            proxy_set_header X-User-Id $user_id;
            proxy_set_header X-Team-Id $team_id;
            proxy_set_header X-Role    $role;
            if ($request_method = OPTIONS) {
                return 204;
            }
            auth_request /auth_teamlead;
            proxy_pass http://team_service/api/drivers$1$is_args$args;
        }

        location ~ ^/attempts(/.*)?$ {
            add_header Access-Control-Allow-Origin $cors_origin always;
            add_header Access-Control-Allow-Credentials true always;
            add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS, PATCH" always;
            add_header Access-Control-Allow-Headers "Authorization, Content-Type, Accept, Origin, X-Requested-With, X-API-Key" always;
            
            if ($request_method = OPTIONS) {
                return 204;
            }
            auth_request /auth_admin;
            proxy_pass http://attempt_service/api/attempts$1$is_args$args;
        }

        location ~ ^/challenges(/.*)?$ {
            add_header Access-Control-Allow-Origin $cors_origin always;
            add_header Access-Control-Allow-Credentials true always;
            add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS, PATCH" always;
            add_header Access-Control-Allow-Headers "Authorization, Content-Type, Accept, Origin, X-Requested-With, X-API-Key" always;
            if ($request_method = OPTIONS) {
                return 204;
            }
            if ($request_method = GET) {
                error_page 418 = @challenges_get;
                return 418;
            }
            auth_request /auth_admin;
            proxy_pass http://challenge_service/api/challenges$1$is_args$args;
        }

        location @challenges_get {
            internal;
            add_header Access-Control-Allow-Origin $cors_origin always;
            add_header Access-Control-Allow-Credentials true always;
            add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS, PATCH" always;
            add_header Access-Control-Allow-Headers "Authorization, Content-Type, Accept, Origin, X-Requested-With, X-API-Key" always;
            set $fixed_uri $request_uri;
            if ($request_uri ~ ^/challenges(/.*)) {
                set $fixed_uri $1;
            }
            proxy_pass http://challenge_service/api/challenges$fixed_uri;
        }

        location ~ ^/leaderboard(/.*)?$ {
            add_header Access-Control-Allow-Origin $cors_origin always;
            add_header Access-Control-Allow-Credentials true always;
            add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS, PATCH" always;
            add_header Access-Control-Allow-Headers "Authorization, Content-Type, Accept, Origin, X-Requested-With, X-API-Key" always;
            if ($request_method = OPTIONS) {
                return 204;
            }
            proxy_pass http://score_service/api/leaderboard$1$is_args$args;
        }

        location ~ ^/scores(/.*)?$ {
            add_header Access-Control-Allow-Origin $cors_origin always;
            add_header Access-Control-Allow-Credentials true always;
            add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS, PATCH" always;
            add_header Access-Control-Allow-Headers "Authorization, Content-Type, Accept, Origin, X-Requested-With, X-API-Key" always;
            if ($request_method = OPTIONS) {
                return 204;
            }
            auth_request /auth_admin;
            proxy_pass http://score_service/api/scores$1$is_args$args;
        }

        location ~ ^/penalties(/.*)?$ {
            add_header Access-Control-Allow-Origin $cors_origin always;
            add_header Access-Control-Allow-Credentials true always;
            add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS, PATCH" always;
            add_header Access-Control-Allow-Headers "Authorization, Content-Type, Accept, Origin, X-Requested-With, X-API-Key" always;
            if ($request_method = OPTIONS) {
                return 204;
            }
            auth_request /auth_admin;
            proxy_pass http://score_service/api/penalties$1$is_args$args;
        }
    }
}
